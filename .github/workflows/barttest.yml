name: barttest
on: 
  push:
  workflow_dispatch:
jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            
            - name: Checkout devconf
              uses: actions/checkout@v4
              with:
                repository: OpenConext/OpenConext-devconf
                ref: main
                path: devconf
                sparse-checkout: stepup

            - name: Debug
              run: ls -al devconf/

            - name: Debug2
              run: ls -al devconf/stepup/
